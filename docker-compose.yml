version: "3.8"

services:
  hermes-dashboard:
    build: .
    image: hermes-dashboard:latest
    container_name: hermes-dashboard
    ports:
      - "3000:3000"
      - "8643:8643"
    volumes:
      # 宿主机 hermes 二进制（必需）
      - ~/.local/bin/hermes:/usr/local/bin/hermes:ro
      # 宿主机 hermes 配置和会话（必需）
      - ~/.hermes:/root/.hermes
      # 对话工作目录（可选）
      - /tmp/hermes-chat:/tmp/hermes-chat
    environment:
      - HERMES_NO_COLOR=1
      - HERMES_YOLO_MODE=1
      - HERMES_BIN=/usr/local/bin/hermes
    restart: unless-stopped
